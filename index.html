<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - U.E. Josefina Pimentel</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="login-page">
        <!-- Lado Izquierdo (Fijo en todos los dispositivos) -->
        <div class="login-left">
            <img src="src/assets/logo.png" alt="Logo" style="width: 120px; margin-bottom: 20px;">
            <h1>U.E. Josefina Pimentel</h1>
            <p>Sistema de Gestión de Nóminas y Expedientes</p>
        </div>
        <!-- Lado Derecho (Formulario) -->
        <div class="login-right">
            <div class="login-form-container">
                <form id="loginForm">
                    <h2>Iniciar Sesión</h2>
                    <div class="input-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                    </div>
                    <button type="submit">Entrar al Sistema</button>
                    <div id="message"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="src/js/main.js"></script>
</body>
</html>
